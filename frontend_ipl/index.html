<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Player Price Predictor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b, #7c2d12);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    width: 900px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(255, 140, 0, 0.3);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #f97316;
    text-shadow: 0 0 10px rgba(255, 115, 0, 0.8);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    transition: 0.3s;
}

/* FIX DROPDOWN TEXT VISIBILITY */
select option {
    color: black;
    background: white;
}

input:focus, select:focus {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 10px orange;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #f97316, #fb923c);
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px orange;
}

.result {
    margin-top: 25px;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    background: rgba(255,255,255,0.08);
    display: none;
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.price {
    font-size: 32px;
    color: #22c55e;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🏏 IPL Player Price Predictor</h1>

    <div class="grid">
        <input type="number" id="strike_rate" placeholder="Strike Rate">

        <input type="number" id="boundary" placeholder="Boundary %" min="0" max="100">

        <input type="number" id="dot" placeholder="Dot Ball %" min="0" max="100">

        <input type="number" id="runs" placeholder="Total Runs">

        <input type="number" id="pom" placeholder="Player of Match Count">

        <select id="capped">
            <option value="1">Capped International</option>
            <option value="0">Uncapped</option>
        </select>

        <select id="role">
            <option value="batsman">Batsman</option>
            <option value="bowler">Bowler</option>
            <option value="allrounder">All-Rounder</option>
            <option value="wicketkeeper batsman">Wicketkeeper</option>
        </select>

        <input type="number" id="base_price" placeholder="Base Price (Lakh)">
    </div>

    <button onclick=predict()>Predict Price 🚀</button>

    <div class="result" id="resultBox">
        <h2>Predicted Auction Price</h2>
        <div class="price" id="price">₹ --</div>
    </div>
</div>

<script>
console.log("Hello")
function validatePercentage(value, name) {
    if (isNaN(value)) {
        alert(name + " is required");
        return false;
    }
    if (value < 0 || value > 100) {
        alert(name + " must be between 0 and 100");
        return false;
    }
    return true;
}

function validateNumber(value, name) {
    if (isNaN(value)) {
        alert(name + " is required");
        return false;
    }
    return true;
}

async function predict() {
    let playing_role_Batsman = true;
    let playing_role_Bowler = false;
    let playing_role_Wicketkeeper_Batsman = false;
    let playing_role_All_Rounder = false;
    const role = document.getElementById("role").value;
    if (role=="batsman"){
         playing_role_Batsman = true;
         playing_role_Bowler = false;
         playing_role_Wicketkeeper_Batsman = false;
         playing_role_All_Rounder = false;

    }else if (role=="bowler"){
         playing_role_Batsman = false;
         playing_role_Bowler = true;
         playing_role_Wicketkeeper_Batsman = false;
         playing_role_All_Rounder = false;

    }else if (role=="allrounder"){
         playing_role_Batsman = false;
         playing_role_Bowler = false;
         playing_role_Wicketkeeper_Batsman = false;
         playing_role_All_Rounder = true;

    }else{
         playing_role_Batsman = false;
         playing_role_Bowler = false;
         playing_role_Wicketkeeper_Batsman = true;
         playing_role_All_Rounder = false;

    }
    const strike_rate = parseFloat(document.getElementById("strike_rate").value);
    const boundary_Percent = parseFloat(document.getElementById("boundary").value);
    const Dot_Percent = parseFloat(document.getElementById("dot").value);
    const Runs = parseFloat(document.getElementById("runs").value);
    const POM = parseFloat(document.getElementById("pom").value);
    const capped = parseInt(document.getElementById("capped").value);
    const base_price_lakh = parseFloat(document.getElementById("base_price").value);

    if (!validateNumber(strike_rate, "Strike Rate") ||
        !validatePercentage(boundary_Percent, "Boundary %") ||
        !validatePercentage(Dot_Percent, "Dot %") ||
        !validateNumber(Runs, "Runs") ||
        !validateNumber(POM, "Player of Match") ||
        !validateNumber(base_price_lakh, "Base Price")) {
        return;
    }

    const data = {features: [
        strike_rate,
        boundary_Percent,
        Dot_Percent,
        Runs,
        POM,
        capped,
        base_price_lakh,
        playing_role_All_Rounder,
        playing_role_Batsman,
        playing_role_Bowler,
        playing_role_Wicketkeeper_Batsman
    ]
    };

    try {
        const response = await fetch("https://project-9lcp5-79u4mbkl6-sj81official-1224s-projects.vercel.app/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
            
        });

        const result = await response.json();
        console.log("result "+result)

        document.getElementById("resultBox").style.display = "block";
        document.getElementById("price").innerText = "₹ " + result["Prediction"] + " Lakh";

    } catch (error) {
        alert("Error connecting to backend 🚨");
        console.error(error);
    }

}
</script>

</body>
</html>
